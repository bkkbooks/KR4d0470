body:
  text: 秋巖詩集卷上元陳宜甫撰樂府歌行飲馬長城窟我來長城下飲馬長城窟積此古怨基悲哉築城卒當時掘土深望望築城髙縈紆九千里死者如牛毛骨浸窟中水魂作泉下鬼朝風暮雨天啾啾哭不已昔人飲馬時辛苦事甲兵今我飲馬來邊境方清寧馬飲再三嗅似疑戰血腥昔人有哀吟吟寄潺湲聲潺湲聲不住欲向何人訴青天不得聞白日又欲莫此恨應綿綿平沙結寒霧望鄉歌寄盧疏齋天漠漠兮夜茫茫草蕭颯兮金風涼白日淡兮霧慘沙磧冷兮雲黃有人兮獨立而惆悵悲歌兮南望而思鄉遡孤鴻之影滅兮書不得而遠寄驚走之伏莽兮那思馳騁而發狂上駝車于半坡渺啞軋之餘響認寒廬之幾點兮浮炊爨之煙蒼天將寒兮感物變歲欲暮兮單衣裳三載不浴兮黧瘦質之塵垢鬢根點雪兮亂飛蓬之秋霜心一去兮萬餘里望不及兮雲飛揚懷千載之向上兮人已云逺留萬古之遺恨兮綿綿久長髙臺荒兮哀李陵節旄落兮感蘇郎蔡琰悲憤兮兒呼母而失聲公主悲歌兮願為鵠而鶱翔彼丈夫女子之不同兮其情况則一耳今我之念昔兮誰後我而悲傷􅀢天宇之開廓兮去留野鶴之容易垂我王之憫顧兮總歸吾土而徜徉如醉夢兮意撩亂重悵望兮回中腸悵望兮苦歌思之沉鬱抱琴兮託遺調于宫商夜聞隴西歌有懷牧庵左丞君莫唱楊柳枝遊子多别離君莫唱金縷衣人老更無年少時自古唱歌易悲感思入碧雲愁黯黯陽關三疊不堪聞河滿一聲腸已斷君不見大風雲飛揚漢歌思沛鄉又不見楚王氣蓋世泣下愁烏江英雄勝負總塵土一樣蕭蕭白楊墓山河大地只如昨歌聲暗促年華度我來隴西成浪遊寂寞春殘又到秋斜陽已落荒壘暝片月自照交河流此時旅腸悲火熱隴西歌客歌清切學將鸚鵡樹頭聲化作杜鵑枝上血寒風不動馬不鳴餘音嫋嫋含餘情却疑古來出塞曲至今流落傳邉庭我為沉吟愁不寐懷古思鄉賦歌意歌聲已斷歌思長白雲衰草天茫茫氈車行北方氈車千萬兩健牛服力駱駝壯清晨排作鴈陳行落日分屯夾氈帳轍分古道辨東西白雪黃雲不可迷後人迤邐循舊迹那知創自軒轅時兩輪奔奔如日月經年轣轆何時歇輾教沙草緑還枯幾過河氷凍仍裂江南野客慣乘舟北來只夢煙波秋於今天下皆王土欲得回轅到彼遊夜靜聽道友董舒隱彈李陵思漢因賦長歌以寫其當時之意云呈傅初菴幽人南來彈玉琴泠泠一曲悲南音况作李陵思漢調使我夜聽憂難禁將軍雖云去已久得君為寫千古艱難心初撚指下才輕舉黃金殿上聞天語將軍肯行天子許戰勝良功立須取大絃忽變軒昂聲指揮劔客真竒兵倐然百騎合爭戰亂箭如雨強弓鳴小絃喑嗚復抑鬱不覺計窮力應屈微臣慮逺深自謀莫逆帝心果安出須臾聲答鴈聲長雁來無書徒憶鄉孤忠空照日耿耿慚愧強謝蘇中郎續續泛音轉迢遞遙望長空幾千里髙臺揮淚落斜陽望斷漢宫五雲起司馬忠言猶且疑臣心只願蒼旻知臣雖不歸築臺在後人或為臣傷悲我為聽琴哀此意何况飄蓬沙漠地幾年屢過將軍臺雲淡霜寒草憔悴今宵聽君彈此曲喜為將軍鳴不平曲終夜長萬籟靜使我歸興欲戀岩上松風清四歌行有父有父溪村居蒼顔白髮七尺軀醉時髙歌樂疏曠家無擔石常晏如東鄰西舍邀即去不復晚景悲桑榆有兒流落在天末未得歸隱同樵漁嗚呼一歌兮重長嘆遙望家書寄回鴈有母有母年七十家中倚門望兒泣昔年典衣供學書惟願功名當早立去年縫衣念逺遊老眼穿針恐行急兒也驅馳荷聖明薄俸寄歸嗟晚及嗚呼二歌兮心悲傷白雲萬里閩天長有兄有兄純且良少年糊口遊四方前載相隨逺歸侍三人戲綵登髙堂胡為伯氏早云殁使我不得如鴈行如今逺求養親祿仲氏有賴常在傍嗚呼三歌兮悲百種薑被孤寒不成夢有姊有姊在建陽夫家辛苦事農桑兵後全身喜相見陳情未已酸離腸留錢漫效故人意悲啼寄語思爺娘别來三載消息斷也應憶弟留他鄉嗚呼四歌兮懷昔日抱我聽書近鄰室五言古詩初春月寄王眉叟嬌娥對春初新畫一眉月脈脈天涯心迢迢拜瑶闕微光射邊壘行客憶離别今年十三度隨處見圓缺料得山中人憐我冒風雪素衣塵欲緇玄髮星忽忽惟此哉生明偏照歸心切涇河詩一首寄王克齋同知古人云涇河水流本渾濁今我來涇州見水繞城郭塵顔照清泚似怪纓可濯古來有讒士曽厭清流惡讀灌夫傳呈傅初菴學士堂堂灌將軍非與侯者儔挺身入吳壘發憤報父讎聲名震朝野意氣凌斗牛鴻毛視貴戚加敬貧賤流及其去官日只結魏其侯武安約無信是啓怒所由况於行酒間一語輒不投遂乃致竒禍魏其甘與侔朝臣兩可奏太后魚肉憂上書竟不辨棄市渭城休地下為鬼雄怒目亟復讎武安族已矣一死俱荒丘雖云冥漠事亦是朝廷羞道友黃石崖寄惠李伯時所畫石鼎聫句圗詩題其後美哉劉進士天賦俊逸才堂堂校書郎琢句如瓊瑰相逄一夜語持論無塵埃蒼髯醜道士骨瘦撑枯柴癡坐默以哂二子不足排等間指石鼎共賦聊攄懷𡨕心運巧思下筆神鬼哀二子技漸窮道士方咍咍疊出險怪語不自人間來更闌燭見跋爐火成寒灰詩成各假寐鼻息聲如雷曙光己不見莫挽仙蹤回明朝語昌黎嘆服稱竒哉雄文照千古事迹不可埋龍眠畫入神寫意兼形骸崖翁祕之久寄贈來金臺披圗再玩味使我昏眸開精神儼如在恨不吾同儕長歌續遺響清風繞茅齋雙耳忽鳴雙耳忽爾鳴似非人籟傳晴雷殷白晝石澗奔寒泉曽瑟固宜捨陶琴可無絃𡨕心試靜想觸類問蒼天徐州讀黃樓碑黃樓灰燼餘基峙東門外雄碑刻石賦烈火燒不壞美哉詞翰人光熖好文彩世間兩竒絶呵護有神在風流尚可想山川見英邁清河通渺茫黃河急流會隄防太守功一力去民害重城不沮洳至今感遺愛我來立斜陽一讀一再拜企慕賢弟兄清光照千載送琴與閻子靜承旨我從西陲來只挾書與琴書以閲古道琴將回古心誰謂今之人寥落無知音先生一邂逅磊磊開胸襟慨然志氣合起我擊節吟請君彈文王周雅尚可尋再理杏壇操魯風尤所欽莫調出塞曲遊子悲難禁君歸抑何贈所愧無瑶琳舉琴以送君聊比雙南金舊扇吟寄程雪樓廉使去秋藏篋中依舊明月在攜持骨格輕發揮力量大四海蒙清風炎官悉除害不以用舍期握手永相愛留忠齋承旨南歸蒙寄廣香鹽梅作别渴心久生塵鼻孔徒撩天豈意留夫子修書念臞仙竒香清垢衣鹽梅止饞涎氣味憶吾土安得隨歸鞭范侍郎自燕都來惠韭久居大漠天不見生芻束慣儲狐􅊵味飽啖牛羊肉故人燕山來新韭剪春緑藤筐慎愛護道里經十宿抖擻猶芳鮮惠我意良篤紅盤飣翠霧下筯興已足一洗腥羶腸稍慰藜莧腹永懷夜雨吟歌聲繞梁屋龍虎山靖通菴前有古樹腹空忽生新竹自腹中而出同山諸友吟詠甚多豫乃繼韻山中有古樹矯矯蟠深根磅礴數十圍秀色何氤氲鐡幹霜雪老蒼皮苔蘚䀶虛心守貞固衆木同推尊堂堂此君種深感母子恩四月剖脅生蒼蒼凌天門胡為老龍精養此幻小孫拳拳慎懷抱器質如瑶琨恐是孤竹君見此再世魂或疑費長房化杖從飛奔峥嶸日已長期汝未易言清風滿巖谷直節挺乾坤扶持得神力呵護嚴虎賁俯憐老大身有賴清蔭存天寒藉垂芘風撼為屏藩相依若唇齒氣味同蘭蓀許容女蘿附削去荆棘繁我歌美真宰髙標在淇園蟻出一首同張太監賦三月春雷鳴朔方啓萬蟄茫茫沙穴中衆蟻出如翕亂走若經營引隊類出征相逄共耳語得食同羶􅧍我亦蟻蝨臣飄零寄兹土不招南柯夢顧盻重憐汝歌詩為徐行惟恐傷汝生富陽李宗勉丞相墳丞相何年薨鬱哉此佳城石羊卧煙雨兩馬矯欲鳴翁仲喚不譍夜語招山精往昔朱旐來人詫死葬榮鑿山進深邃砌石宏經營結廬慎呵護樵牧焉敢行豈不有子孫嵗嵗酹酒傾豈期百年後返使神鬼驚風濤翻浙水亂卒交縱橫民居虜掠盡猶記死者名操戈立塜上嘯動疑山崩舂鋤鬬揮手舉石犂為坑紅棺碎霞色體貌渾如生提撕解寶帶收拾金滿籯一錐控渠口採出珠光明形骸委泥草老樹飢鴉聲恐公德不及身後禍乃萌或為此財纍以致害不輕未從史書見重感空墳塋舟人指示豫歷説為愴情長林落日暝逺浦寒煙晴歌詩弔冥漠江濶愁波平七言古詩謝平原趙郡公贈山桃杖君不見少陵桃竹杖拔劒或與蛟龍爭又不見東坡鐵拄杖迸火石上飛裂星二公去已久今遇平原叟吾衰氣未餒欲趁牛馬走美君出入真如飛山桃拄杖長相隨秋巖老人􅐁所好慚愧慷慨擲與之赤蛇入手鱗甲縮可遊天下棄車轂大道徐行鬼神哭探出一指豺虎伏橫挑百錢尋酒家不須經卷挂南華春風好訪瑶池去試問蟠桃幾度花京兆廉訪使趙彥澤贈椰瓢稯扇昔聞趙廣漢治民立政為銗筒又聞趙悅道宦歸只有琴鶴從觀君矯矯真華胄如神擲伏清廉同我來相逄再相别感贈二美情攸隆瓢分海南煙雨之椰子扇裁華山雲壑之七棕左手攜瓢泛春酒澆除磊砢生顔紅右手攜扇却夏熱煩襟蕭爽香塵空酣歌慷慨意不俗自笑鄙語難形容願君飲氷去酷吏我當斟酌元氣揚仁風隆德縣望火臺近山一臺突兀勢逺山一臺出天際何時築此望烽火留及如今太平世六十年來無甲兵西方樂土邊陲清君王神武今混一藩籬大剖無金城尚餘此臺屹山頂照月愁風拄孤影昔人觸目心膽寒今日空迷野煙瞑行歌為我重悲傷願臺萬年無火光李陵臺將軍少年真英雄隴西家世凌邊鋒竒材劒客五千士自當一隊馳威風浚稽山前突戎騎被圍未蹈生擒計強弓徑弩百萬兵流血成丹皆戰驚誰知管敢漏機密遂使空弮冒鋒鏑歸無面目見君王將身未免降勍敵繼曽殺李緒尚欲謀歸去蒙恩雖已深實起懷鄉心髙陵築臺望鄉國中郎去後空哀吟纍土髙一尺望天近一尺誰為削平山望見長安陌望鄉不見春復秋將軍一去臺空留我家住在南海上今日登臺重凄愴遼天漠漠飛黃雲草中但見牛羊羣家山不識在何處教人空自憶將軍題金城縣漢李夫人墓延年歌發漢主惑緣何傾城再傾國為言美人絶姿色曠代不遇難再得瑶臺金屋流春風夫人綽約真天容等間承恩媚一笑六宫爍伏花顔紅寵深體弱忽寢疾不願君王顧衰質兒將有托即瞑目死别那知恨無極玉簫聲斷知何許落日悲風愁萬古一從香骨葬金城芳草青連茂陵土額葉布哈觸網得雙白魚燒以待豫為歌長句一雙白魚不受釣截流有網無由逃銀刀鼓躍眼光轉濡沫濕喣空喁嗷城門失火幸免耳爛額焦頭那及此旋看二美出凌煙天池快意燒龍尾雪肉肥鮮慰老叨金鍾釂酒發詩豪醉來還唱漁家曲欲駕雲帆釣巨鼇橐駝雛一首寄吳成季槖駝雛生來已髙三尺餘昂頭便覺氣貌殊學跪有禮端莊如主人念幼寒迫膚覆以錦毯花糢糊母步亦步趨亦趨一旦百里力不瘏有時跳梁挽駿駒恥在牛後嗤黔驢沙泉足飲草滿墟肉峰易聳身魁梧看爾負重行天衢一蠓吟同留承旨賦一蠓飛從何處來泊我書葉如點埃眼明細辨見形狀喙潛腳動翼稍開雖云區區至微命汝亦含靈存本性不隨蚋蟆噆人膚獨立暫時那忍屏君不見莊生廣論萬物齊蚊睫可托焦螟栖仲尼一聼老聃語自愧聞道猶醯雞嗚呼古人已往不復返對汝興思重嗟嘆五言排律和吏部趙子昂久雨見寄屯營襄武地秋雨久難禁雲色浮天近客愁連海深隂迷山寂寞冷滴樹蕭森鴈濕低垂翅馬行淹壯心少陵憂草色無已笑鳶吟泥濘難相屈徒懷誼斷金謝張疇齋惠筆深感贈豫筆江淹好夢醒聽陳古人意吟取與君聽毛髮欲上指鋒芒初發硎黑雲蒸九澤硯水捲滄溟造化寧無補江山助有靈峽流春洶洶溪霧晝冥冥大手誇無敵英賢得寧馨我才慚朽木吟思蕩浮萍縱欲窺天巧那能瑞帝庭徒扛九鼎重難釣五侯鯖蛇悔多添足蠅知誤點屏班超投有志王述怒空形冥斂浮光彩間修靜典刑養生抄素問學道寫黃庭批注鑽龜䇿標題相鶴經詩瓢宜泛水文冢合書銘適意添花譜垂名厭竹青品茶追陸羽頌酒繼劉伶白髮為何事青山可暮齡殷勤祝毛頴爾勿歎伶俜過華清宫和溫庭筠詩二十二韻前王遺構地今我獨來遊渭水煙如昨驪山樹己秋苔荒老姥殿草滿夕陽樓下馬山腰曲朝元雲頂頭周回認故迹想像走諸侯春暖回龍駕天寒進翠裘時平安御極曙早肅宸旒節鎮威咸服農家稼倍收溫泉媚池沼和氣舞旌斿歘盛真妃寵驕生義子羞寰區平似掌逆黨曲如鉤眷顧迷方寸須臾撼九州眉愁太液柳齒嚙未央榴龍子扶新日豬兒殺怒虬蜀山旋六御桃野放羣牛豈不天神力能消父過尤山人禆聖德猛將運兵籌既復安巢鳥難忘汗血騮紛紛史上記忽忽夢中休故國雄三輔嵬坡怨一丘日邊通路逺天際斷雲愁嘆息人何在山泉依舊流秋巖詩集卷上
