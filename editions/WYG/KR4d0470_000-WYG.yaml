body:
  text: 提要陳秋巖詩集二巻别集類四元臣等謹案陳秋巖集散見永樂大典中然不著其名亦不著時代考焦竑國史經籍志有陳宜甫秋巖集當即其人而爵里則終無可考集中接劉介臣書詩云㡬回夢裏尋君去三尺書來約我歸閩海浪肥春雨過和林沙逺曉雲飛則當為閩人又有庚辰再隨駕北行二詩庚辰為至元十七年則元世祖時嘗為侍從又有讀元貞改元詔詩丙申十月扈從晉王領降兵入京朝覲詩考之元史丙申為元貞二年晉王名噶瑪喇案噶瑪喇原作甘麻剌今改正裕宗長子天性仁厚御下有恩王府官屬自内史以下俱請命天子不敢稍專嘗出鎮北邉叛王永和爾案永和爾原作岳木忽兒今改正等聞其至望風請降至元二十七年封梁王二十九年改封晉王所云領降兵者應即此事則成宗時又為晉王僚屬其詩多與盧摰姚燧趙孟頫程鉅夫留夢炎等相為倡和而諸人詩乃罕及之其始末遂不可復詳矣原集焦志作一巻然篇什稍多疑其字畫偶誤今據永樂大典所存者編為上下二巻其詩大抵源出元白雖運意遣詞乏深刻竒警之致而平正通達語無格礙要自不失為雅音也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:90f5f4b39ddd71eaee6ab905e2bdaa90c60d10bae6290f9e063b0f73fc445ae0
