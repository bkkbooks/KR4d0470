body:
  text: 秋巖詩集卷下元陳宜甫撰五言律詩讀改元詔詔下改新元元貞體大乾風雲開景運日月麗中天桃實三千嵗蘿圖億萬年微臣仰春澤早潤及窮邊元貞丙申十月扈從晉王領降兵入京朝覲奏凱引降騎長歌入帝都人皆帶弓箭我獨載詩書考績慚無補懷歸盍早圖故交相慰勞尊酒話勤劬丙申秋同錫喇平章重過和林城故宫昔日憲皇帝和林建此宫中原盡朝貢嘉運會英雄沙漠皇風逺蒿萊古殿空最傷西蜀道六御不回龍庚辰春再隨駕北行二首天地蒼茫濶其如旅况何氷融河水濁沙接塞雲多土穴居黃鼠氈車駕白駝栖栖無所樂逺近聽朝歌四更催蓐食結束閙比鄰人去留殘迹車行擁後塵雲開還有月風冷不知春幸得狐裘在溫存逆旅身梁王春宴碧草春光合青雲羽衛屯和風生帳殿遲日轉轅門樂緩新聲奏歌長倚和喧微吟動髙興未數漢梁園晚霞紅霞散天外掩映夕陽時織女拋殘錦蚩尤播火旗江風吹葉落野火傍山移愛此光華好沉吟欲去遲秋夕一首寄李明府獨坐真無賴清吟誰與同壯心惟浩嘆往事已成空明月秋砧起西風畫角雄如何今夕夢多在故鄉中秋蓬秋蓬元脆弱蟠結強扶持一夕因風斷孤根到處移行人搔白首書客感龎眉莫使心如此朝朝可自治九日明朝是寄吳成季九日明朝是征人未到家書無來使便菊有故園花秋鬢霜根短西風雪片斜持螯間老手愁思滿天涯九月九日有懷平原郡公趙五山經年留朔漠此日又重陽遊子淚沾雨行軍氣挾霜沙場愁草白籬落憶花黃忽念登髙處凄涼更一觴同盧疏齋學士泊舟桃源縣客行河水上倚棹望桃源近有人來住新栽桑滿園沙鷗宜緑水驛馬又黃昏忽聽漁歌響武陵愁客魂舟中負暄次趙吏部韻燠燠耀紅輪熙熙曝背人晴消兩岸雪滿載一船春天地溫存意江湖冷落身因思獻君去歡喜整烏巾洛陽一出新安道停驂看洛京草埋東漢殿樹暗則天城風月渾依舊山河幾戰爭客行懷往事更值暮猿聲晚行渭南道中同張太監賦驛路多酸棗行人翠色中涼風生渭水落日照新豐犬吠前村逺鴉飛暝靄空客逰便水竹去馬惜匆匆隆德縣德勝寨五代以來隴右之地為吐蕃所有宋祥符間曹武穆公復其地築寨屯兵以守之古碑猶在李時傑請豫賦詩以紀勳臣之遺迹焉將軍拓邊地曽此立竒勳野草生空寨荒城鎖暮雲山留舊耕迹苔暗古碑文得失如翻掌後人徒憶君夏日旅中五月駸駸過遷營又轉車乳禽鳴野草亂蟻走荒沙雨老蕁麻葉風吹大戟花地涼無苦熱自是客思家聞塞笛有懷趙詹澤廉使客行思故鄉聞笛轉凄涼不見梅花落空愁塞草黃鴈聲沉逺漢牛背送斜陽出塞翻新曲誰知恨更長次盧疏齋韻不聽琵琶久攜琴為寫憂黃鍾明月夜青塜白雲秋悲怨當時語凄涼此日愁曲終意不盡鳴鴈過幽州塞上聞雞呈崔中丞塞翁帶雞至啁哳塞垣深喚醒征人夢遙思君子心霜寒秋草短月落曉星沉擬促劉琨輩相同舞劔吟次程雪樓御史見寄韻昨擬賦歸去那知又再來黃雲馳驛道落日喚鷹臺得句懷三影通靈慕萬回知君重思逺難寄隴人梅晚立晚立動詩興涼風吹角巾空山答犬吠殘照送行人天外五湖思邊陲萬里身家書春暮寄何日到南閩懷川晚立清川繞縣衙小立共汀沙暝色催歸鳥春愁對落花江湖頻戀闕風雨更思家出處成何事唯添兩鬢華得家書報父病憂悶而作親年逾八十隨分老江村舊喜更生齒今憂病不言孤雲憐白首薄日畏黃昏幸得加餐外猶能飲一尊張叔紀自燕寄書賦此以答六年書兩得意重語殷勤夢話薊門雨行吟沙塞雲蒼蠅思驥尾野鶴笑雞羣南望空惆悵天寒日又曛理髮一首寄傅初菴學士清晨獨理髮髮短似鬚長白日行何速蒼顔秪自傷林間空水石馬上亦風霜憔悴今如此詩歌未減狂賦紙被呈王克齋同知楮糜秋水滑造出已端方一片雪如席幾多春滿床梅花頻有夢龍腦不沾香只抱天然白綺羅難久長觀曹娥廟碑同張師道學士賦沿流七日哭竟與水浮沉河伯不敢受父尸終可尋斷碑秋雨暗古廟暮雲深忠孝男兒事吁嗟女子心歌風臺髙祖去已久歸如魂魄何俗傳西漢事碑刻大風歌山逺分滕壤氷開響沛河荒臺兩間屋衰草夕陽多陪趙左丞晚過臨潼臨潼天欲暮騎馬去駸駸翠湧驪山秀清流渭水深路繁酸棗樹市接古槐隂明日長安道新詩擬共吟徐浩然任西京經歷考滿回京訪子於城西寓舍賦此以寄燕山逢舊友喜欲舞婆娑屈指三年别論心半夜過車輕寒馬健囊澀薦書多却問西京地民風近若何次詹天遊學士見寄韻悵望日邊客天遙雲水重書中曽寄語夢裏忽相逢細雨埋芳草寒煙入古松何時一晤語尊酒又從容送京兆侯伯偉歸覲十年江海上英邁已超倫斗酒辭狂客千金夀老親隂風吹北塞明月照西秦驛馬天涯去中原花正春寄史蘭谷少監李海一尚書天寒幽薊逺懷友苦勞心最喜加官秩曽煩寄俸金雪消蘭玉秀春暖海濤深何日蓬萊館觴飛共醉吟送徐留村之上饒教授聖朝方選士補治舉𢎞綱此道重昭灼惟公妙左張燕臺秋月白葛水曉風涼同是江南客離情易慘傷懷李明府在閩别來經兩載出處喜平安舉世多權吏惟君獨冷官林霜黃橘熟山雨緑榕寒邊使歸來日音書定得看失馬次張疇齋學士韻想因貪草去杳莫聽嘶鳴失豈不為福無之何以行雪深空有迹鞍在未忘情只合在驢背吟詩興轉清悲獵淺草卧才穩俄驚獵騎鳴塵迷三穴失電過幾坡平捷疾飛鷹攫踉蹡走犬爭月中那得路搗藥乞長生七言律詩扈蹕作丹詔香傳紫禁泥九重臺殿曉雲低碧桃露重初鶯語青草風微去馬嘶劒佩元依新日月旌旗慣識舊山溪野人扈從慚無補空落詩名在隴西贈汪總帥風嚴帥府氣昂霄三十青春貴不驕將相一門多厚祿功勳百世重清朝珂鳴紫陌春行馬箭入黃雲晚射雕武略不施邊塞靜幾回氊帳話逍遙后賜狐裘青紫貂蟬分不容狐裘猶得賜微躬恩來窈窕宫庭內春在蒙茸領袖中披拂灞橋驢背雪侵凌薊北馬頭風何時詔許江南去著向煙波理釣篷讀忠齋題西遊稿詩有懷治由經濟信真儒周度咨詢用厥謨嘉爵已崇承旨貴至尊常獨狀元呼吳天歲月頻清夢燕地風霜久白鬚展卷有懷歌雅什可慚魚目映驪珠讀舅氏歐耐軒遺稿舅沒於今二十年文章零落更誰傳朝廷不喜劉蕡䇿風月空留李賀篇得米養親供子職有才無命豈天然人言我貌偏相似收讀羣書即舊氊題張騫乘槎圗雪湧銀濤八月秋風吹巾袂興悠悠坐來蓬島千年樹穩勝蓮花一葉舟星照橫機問織女月明清渚立牽牛偶然得石歸來後却厭金章萬户侯題吳綵鸞寫韻軒詩衣染紅塵幾歲除琪花瑶樹憶清都光寒秋月歌明鏡香暖春風曳繡襦仙態自來天上别韻書應怪世間無彩雲夢散簫聲逺日落江山空畫圗鐡柱宫大冶飛紅役鬼兵南昌雄鎮得清寧地神肅護天風靜鐡氣遙浮江水腥銅柱石髙空有信金盤露冷竟無靈還知許令神功異直對西山萬古青仙巖颯颯松風吹鬢毛溪流洗耳逺塵勞七千餘鶴春歸晚二十四巖秋正髙露滴桂香浮酒盞山蒸雲氣潤詩袍扁舟半是乘槎客吟振雷聲撼海濤鳯凰臺白雲蒼蘚古臺基憶得當年鳯去時深慕楚狂歌往諫空懷虞德見來儀英雄磨滅青山在梧竹凄涼落日悲草滿鷺洲吟思逺薄材難和謫仙詩同狄子玉司馬登和林佛閣留題邊城寂寞磧雲黃興廢令人重感傷鴉噪夕陽迷佛宇煙凝秋色暗宫牆十年故國人何處九月隂山草又霜共倚欄杆懷往事金仙無語塞天長同張尚書趙侍郎飲于長安酒肆主人從豫乞對句標題豫為題曰萬斛香浮金掌露四時人醉洞庭春上馬後足成一詩偶從酒肆樂天真又見羲皇化俗淳萬斛香浮金掌露四時人醉洞庭春休官最喜陶元亮荷鍤當隨劉伯倫晉代風流無復見更誰傳此醉鄉神聞崔中丞舉薦李明府窗螢乾死册塵埃滿擬功名寄酒杯富貴逼人從分定等間乘興出山來馬鳴曉入皇都府鶚薦秋飛御史臺君與石溫同去就烏公元自識竒材沛豐懷古寄程雪樓御史大蛇中斷戰旗紅一旦興亡起沛豐三月灰飛秦事業四方雲合漢英雄張良雖有運籌力項伯當全舞劒功帝業如今何處是歌臺荒草自春風送東崖劉大使重赴上都朝覲氣與嶽雲相蕩摩詔催驛騎渡天河江南遍覽湖山秀薊北重來雨露多逸思可齊鸚鵡賦間愁休續伯勞歌佇看醫國陳竒術春養蒼生合太和咸陽懷古寄李叔固尚書鹿走咸陽王氣微幾朝爭戰幾安危水聲如説隋唐事山色不殊秦漢時春事管絃宜進酒故陵煙雨易生悲向來豪傑俱成夢空費行人弔古詩寄友人作年壯共嗟吾與君苦愁詩思亂紛紛邊城古路開殘雪夜月孤鴻呌斷雲天逺望鄉懷渺渺嵗窮流水嘆沄沄眠醒獨更堪清冷煙隴空寒山笛聞有感爾因何事多湮鬱俯首長鳴苦不休憶載浩然寒鍊句思從果老舊仙遊戍樓風起角初咽戰地雲昏鬼亦愁莫笑窮途悲歲晚帝城春近逐驊騮憶梅懷傅初菴學士十年不見梅花樹長憶暗香氷雪顔心逐暮雲飛庾嶺夢隨寒月到孤山縞衣叩户來何晚翠羽傳書去未還一自西湖幽響絶豈無詩句落人間用閻子靜承旨贈行韻奉寄喚醒舊夢十年前老得清間似散仙幾度行吟燕下月遙思家住海雲邊蒲團夜學修丹術花宴春忘舞錦纒好信不來鴻鴈逺斷腸人在幕南天得姚牧菴左丞書賦此以答憶從相别醉吟鄉漠北燕南幾雪霜四海競傳三語掾一書偏慰九回腸智囊賸有安民術荷橐能無薦士章拭目看君承寵渥春風花對紫微郎重接劉介臣書記得登舟惜别離天涯相望兩依依幾回夢裏尋君去三度書來約我歸閩海浪肥春雨過和林沙逺曉雲飛今秋擬逐歸鴻便為説家中莫寄衣聞櫓聲一首寄張子有尚書泛泛扁舟緑渺茫櫓聲咿􅥆送凄涼孟郊句澀沉吟苦賈誼書成太息長響答漁歌來近浦清搖人影舞斜陽縱然喚醒江湖夢遊子難禁鐵石腸懷李海一尚書記得去年寒食後君從北上我西遊山川總入英豪氣風雨不堪離别愁歸馬有知元識路來鴻無信動經秋燕臺又擬相逢日共説長安古帝州寄舅氏歐淡菴南海山村别業成有園堪種地堪耕攜書自教兒孫讀對客曽談宅相榮飲酒頗同康節興年髙肯慕太公名遙知散步秋風外吟看寒潮落又生北方松子寄天師希微真人窮髮之北有山岡松花結子成千章蒼皮已護霜雪操玉齒偏凝雨露香未論封公羡丁固更思辟榖學張良殷勤好向仙巖種生意林林看緑秧弔李時傑忠殁誰稱叔又賢屬官隨母入幽燕將門氣槩終無忝詩筆英華早已傳廣不封矦知有分賀悲短命却同年寡妻幼子哀哀哭地逺天寒最可憐西山晉柏當日旌陽種此株千年霜雪不曽枯葉驚蛟泣秋江雨幹作龍拏夜目珠定有丹培資地脈許容藤附入山圗不知諸葛祠前樹得似仙壇一樣無石竹花次留忠齋狀元瘦小琅玕聚碧叢雕紅鏤白靚芳容詞人彩筆摛文錦玉女羅衣唾繡茸鳯擬結巢非所托蜂因採蜜巧相逢一枝欲寄仙娥去雲隔蓬萊水萬重同張學士賦蓮房霞衣零落點煙波香結驪珠聚碧窠齊露玉纎含翠袖圓同佛頂湧青螺柄持絡繹絲綸出心展勾萌造化多今夕扁舟湖上興醉來同和採蓮歌同張子友尚書賦芭蕉榮瘁根苖換嵗年緑雲光照玉闌前雙開掌扇平遮日一卷新書直奏天自可題詩供醉筆不堪聽雨攪愁眠若教種滿人間世得鹿紛紛到夢邊孤鴈寄王眉叟淡淡長空幾陳橫西風吹斷獨飛鳴可憐落落失朋侣似我行行憶弟兄影度墨河秋月冷聲沉紫塞暮雲平江湖自有重逢處努力圗南不用驚弔馬骨逐電追風意氣休尚留枯骨委荒丘龍姿寂寞歸圗畫雪片糢糊慘髑髏露濕寒沙殘月曉風搖衰草白雲秋千金不遇涓人買空有啼鴉弔汝愁五言絶句聞雞度關人己逺倚劒夜初分我亦待清曙前村多白雲七言絶句駕行道中見老農老農村裏别無營飽飯惟知樂太平天子駕來應下顧低頭鞭犢自春耕同汪總帥賦秦王馬跑泉勞苦逺行飢渴煎霜蹄輕跑湧寒泉如今又照驊騮影不似當初出戰年呼鷹臺當日呼鷹意氣雄髙臺揮羽立秋風自從一飽飛揚去空有鴉啼夕照紅題明皇遊月宫圗為賽音平章賦內亂俱平外攘生著心看到月華明若能慣步蟾宫路何必龍輿望蜀行昭君出塞圗為姚承旨賦低撥琵琶怨思長不禁塵染漢衣裳君王豈是無竒䇿間却將軍用女郎渭水萬古清流繞郡回幾朝宫殿化飛灰釣璜人去秋波冷嵗嵗西風鴈影來過交河作黃昏飲馬伴交河吟著唐人出塞歌後四百年來到此夕陽衰草意如何北去李陵經幾秋築臺憔悴望鄉愁可憐隴右天窮處不見交河只淚流次張斯道學士韻不是金華眠石化成羣逺出黑山隂蘇郎一去無人管散入寒煙野草深和林城北唐闕特勒墳特勒魂飛已寂然間華落盡草芊芊大唐碑碣秋風裏猶是開元二十年秋巖詩集卷下
